---
- name: Create required directories
  file:
    path: "/opt/{{ bootstrap_config.REPO_NAME }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - data/wireguard
    - data/kuma
    - certbot/conf
    - certbot/www
    - nginx
    - services

- name: Ensure services directory is writable by azureuser
  file:
    path: "/opt/{{ bootstrap_config.REPO_NAME }}/services"
    state: directory
    mode: '0755'
    owner: azureuser
    group: azureuser
    recurse: true
