name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATEKEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy
        env:
          VM_IP: ${{ secrets.VM_IP }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REPO_NAME: ${{ github.event.repository.name }}

        run: |
          ssh -o StrictHostKeyChecking=no \
            ${SSH_USER}@${VM_IP} <<EOF
          set -e

          cd /opt/${REPO_NAME}
          git pull origin main
          set -a
          if [ ! -f .bootstrap.env ]; then
          echo ".bootstrap.env not found"
          exit 1
          fi

          cd /opt/${REPO_NAME}

          git pull origin main

          cd ansible

          ansible-playbook \
            -i inventory.ini \
            deploy.yml

          echo "Deployment completed."

          EOF
