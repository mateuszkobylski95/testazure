name: Update Domains

on:
  workflow_dispatch:
    inputs:

      wg_domain:
        description: "WG-Easy domain (leave empty to keep the Azure FQDN)"
        required: false

      kuma_domain:
        description: "Uptime Kuma domain (optional)"
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  update-domains:
    runs-on: ubuntu-latest

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:

      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Read Terraform Outputs
        working-directory: terraform
        id: tf
        run: |
          echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT
          echo "fqdn=$(terraform output -raw azure_fqdn)" >> $GITHUB_OUTPUT

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Ensure azureuser docker access
        env:
          VM_IP: ${{ steps.tf.outputs.public_ip }}
          SSH_USER: azureuser
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${SSH_USER}@${VM_IP} \
          "id -nG azureuser | grep -qw docker || sudo usermod -aG docker azureuser"

      - name: Resolve WG domain
        run: |
          INPUT="${{ github.event.inputs.wg_domain }}"

          if [ -z "$INPUT" ]; then
            echo "WG_DOMAIN=${{ steps.tf.outputs.fqdn }}" >> $GITHUB_ENV
            echo "WG_DOMAIN_CUSTOM=false" >> $GITHUB_ENV
            echo "Keeping Azure FQDN: ${{ steps.tf.outputs.fqdn }}"
          else
            echo "WG_DOMAIN=$INPUT" >> $GITHUB_ENV
            echo "WG_DOMAIN_CUSTOM=true" >> $GITHUB_ENV
            echo "Using custom WG domain: $INPUT"
          fi

      - name: Calculate deployment mode
        run: |
          if [ -z "${{ github.event.inputs.kuma_domain }}" ]; then
            echo "DEPLOYMENT_MODE=single" >> $GITHUB_ENV
            echo "SINGLE_DOMAIN_MODE=true" >> $GITHUB_ENV
          else
            echo "DEPLOYMENT_MODE=dual" >> $GITHUB_ENV
            echo "SINGLE_DOMAIN_MODE=false" >> $GITHUB_ENV
          fi

      - name: Update Terraform NSG
        env:
          VM_IP: ${{ steps.tf.outputs.public_ip }}
          SSH_USER: azureuser
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          SINGLE_DOMAIN_MODE_OVERRIDE: ${{ env.SINGLE_DOMAIN_MODE }}
        run: bash scripts/terraform-sync-nsg.sh

      - name: Validate domains
        env:
          WG_DOMAIN: ${{ env.WG_DOMAIN }}
        run: |
          WG="${WG_DOMAIN}"
          KUMA="${{ github.event.inputs.kuma_domain }}"

          if [ -n "$KUMA" ] && [ "$WG" = "$KUMA" ]; then
            echo "WG and Kuma domains must be different"
            exit 1
          fi

      - name: Validate domain format
        if: env.WG_DOMAIN_CUSTOM == 'true' || github.event.inputs.kuma_domain != ''
        run: |
          python3 - <<'EOF'
          import os
          import re

          domains = []

          if os.environ.get("WG_DOMAIN_CUSTOM") == "true":
              domains.append(os.environ["WG_DOMAIN"])

          kuma = "${{ github.event.inputs.kuma_domain }}".strip()

          if kuma:
              domains.append(kuma)

          pattern = re.compile(
              r"^(?=.{1,253}$)(?!-)[A-Za-z0-9-]+(\.[A-Za-z0-9-]+)+$"
          )

          for domain in domains:
              if not pattern.match(domain):
                  raise SystemExit(
                      f"Invalid domain: {domain}"
                  )

          print("Domain validation OK")
          EOF
        env:
          WG_DOMAIN: ${{ env.WG_DOMAIN }}
          WG_DOMAIN_CUSTOM: ${{ env.WG_DOMAIN_CUSTOM }}

      - name: Validate domain DNS
        if: env.WG_DOMAIN_CUSTOM == 'true' || github.event.inputs.kuma_domain != ''
        env:
          VM_IP: ${{ steps.tf.outputs.public_ip }}
          SSH_USER: azureuser
          SERVER_IP: ${{ steps.tf.outputs.public_ip }}
          WG_DOMAIN: ${{ env.WG_DOMAIN }}
          WG_DOMAIN_CUSTOM: ${{ env.WG_DOMAIN_CUSTOM }}
          KUMA_DOMAIN: ${{ github.event.inputs.kuma_domain }}
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${SSH_USER}@${VM_IP} <<EOF

          set -e

          SERVER_IP="${SERVER_IP}"

          if [ "${WG_DOMAIN_CUSTOM}" = "true" ]; then
            WG_IP=\$(dig +short "${WG_DOMAIN}" | grep -E '^[0-9.]+\$' | head -n1)

            if [ -z "\$WG_IP" ]; then
              echo "WG domain does not resolve: ${WG_DOMAIN}"
              exit 1
            fi

            if [ "\$WG_IP" != "\$SERVER_IP" ]; then
              echo "WG domain resolves to \$WG_IP but server IP is \$SERVER_IP"
              exit 1
            fi
          fi

          if [ -n "${KUMA_DOMAIN}" ]; then
            KUMA_IP=\$(dig +short "${KUMA_DOMAIN}" | grep -E '^[0-9.]+\$' | head -n1)

            if [ -z "\$KUMA_IP" ]; then
              echo "Kuma domain does not resolve: ${KUMA_DOMAIN}"
              exit 1
            fi

            if [ "\$KUMA_IP" != "\$SERVER_IP" ]; then
              echo "Kuma domain resolves to \$KUMA_IP but server IP is \$SERVER_IP"
              exit 1
            fi
          fi

          echo "Domain DNS validation OK"

          EOF

      - name: Read current domains
        env:
            VM_IP: ${{ steps.tf.outputs.public_ip }}
            SSH_USER: azureuser
            REPO_NAME: ${{ github.event.repository.name }}
            WG_DOMAIN: ${{ env.WG_DOMAIN }}

        run: |

            OLD_WG_DOMAIN=$(
            ssh -o StrictHostKeyChecking=no \
            ${SSH_USER}@${VM_IP} \
            "grep '^WG_DOMAIN=' /opt/${REPO_NAME}/.bootstrap.env | cut -d'=' -f2"
            )

            OLD_KUMA_DOMAIN=$(
            ssh -o StrictHostKeyChecking=no \
            ${SSH_USER}@${VM_IP} \
            "grep '^KUMA_DOMAIN=' /opt/${REPO_NAME}/.bootstrap.env | cut -d'=' -f2"
            )

            echo "OLD_WG_DOMAIN=${OLD_WG_DOMAIN}" >> $GITHUB_ENV
            echo "OLD_KUMA_DOMAIN=${OLD_KUMA_DOMAIN}" >> $GITHUB_ENV

            echo "Old WG domain: ${OLD_WG_DOMAIN}"
            echo "Old Kuma domain: ${OLD_KUMA_DOMAIN}"
            echo "New WG domain: ${WG_DOMAIN}"

      - name: Detect domain changes
        env:
          WG_DOMAIN: ${{ env.WG_DOMAIN }}
          OLD_WG_DOMAIN: ${{ env.OLD_WG_DOMAIN }}
          OLD_KUMA_DOMAIN: ${{ env.OLD_KUMA_DOMAIN }}
        run: |

            WG_CHANGED=false
            KUMA_CHANGED=false

            if [ "$OLD_WG_DOMAIN" != "${WG_DOMAIN}" ]; then
            WG_CHANGED=true
            fi

            if [ "$OLD_KUMA_DOMAIN" != "${{ github.event.inputs.kuma_domain }}" ]; then
            KUMA_CHANGED=true
            fi

            echo "WG_CHANGED=$WG_CHANGED" >> $GITHUB_ENV
            echo "KUMA_CHANGED=$KUMA_CHANGED" >> $GITHUB_ENV

            echo "WG changed: $WG_CHANGED"
            echo "Kuma changed: $KUMA_CHANGED"

      - name: Delete old WG certificate
        if: env.WG_CHANGED == 'true'
        env:
            VM_IP: ${{ steps.tf.outputs.public_ip }}
            SSH_USER: azureuser

            REPO_NAME: ${{ github.event.repository.name }}

            OLD_WG_DOMAIN: ${{ env.OLD_WG_DOMAIN }}

        run: |
            ssh -o StrictHostKeyChecking=no \
            ${SSH_USER}@${VM_IP} <<EOF

            set -e

            cd /opt/${REPO_NAME}

            docker compose run --rm certbot \
            delete \
            --cert-name "${OLD_WG_DOMAIN}" \
            --non-interactive

            EOF

      - name: Delete old Kuma certificate
        if: env.KUMA_CHANGED == 'true' && env.OLD_KUMA_DOMAIN != ''
        env:
            VM_IP: ${{ steps.tf.outputs.public_ip }}
            SSH_USER: azureuser

            REPO_NAME: ${{ github.event.repository.name }}

            OLD_KUMA_DOMAIN: ${{ env.OLD_KUMA_DOMAIN }}

        run: |
            ssh -o StrictHostKeyChecking=no \
            ${SSH_USER}@${VM_IP} <<EOF

            set -e

            cd /opt/${REPO_NAME}

            docker compose run --rm certbot \
            delete \
            --cert-name "${OLD_KUMA_DOMAIN}" \
            --non-interactive

            EOF

      - name: Update domains
        env:
          VM_IP: ${{ steps.tf.outputs.public_ip }}
          SSH_USER: azureuser

          WG_DOMAIN: ${{ env.WG_DOMAIN }}
          KUMA_DOMAIN: ${{ github.event.inputs.kuma_domain }}

          DEPLOYMENT_MODE: ${{ env.DEPLOYMENT_MODE }}

        run: |
            ssh -o StrictHostKeyChecking=no \
                ${SSH_USER}@${VM_IP} <<EOF



            set -e

            BOOTSTRAP_FILE=\$(find /opt -maxdepth 2 -name ".bootstrap.env" | head -n 1)

            if [ -z "\$BOOTSTRAP_FILE" ]; then
                echo ".bootstrap.env not found"
                exit 1
            fi

            REPO_DIR=\$(dirname "\$BOOTSTRAP_FILE")

            SERVICES_DIR="\$REPO_DIR/services"


            if [ -d "\$SERVICES_DIR" ]; then

                if grep -R "^domain:.*${WG_DOMAIN}" "\$SERVICES_DIR" >/dev/null 2>&1; then
                echo "WG domain already used by service"
                exit 1
                fi

                if [ -n "${KUMA_DOMAIN}" ]; then

                if grep -R "^domain:.*${KUMA_DOMAIN}" "\$SERVICES_DIR" >/dev/null 2>&1; then
                    echo "Kuma domain already used by service"
                    exit 1
                fi

                fi

            fi


            sed -i "s|^WG_DOMAIN=.*|WG_DOMAIN=${WG_DOMAIN}|" "\$BOOTSTRAP_FILE"

            if grep -q '^KUMA_DOMAIN=' "\$BOOTSTRAP_FILE"; then
                sed -i "s|^KUMA_DOMAIN=.*|KUMA_DOMAIN=${KUMA_DOMAIN}|" "\$BOOTSTRAP_FILE"
            else
                echo "KUMA_DOMAIN=${KUMA_DOMAIN}" >> "\$BOOTSTRAP_FILE"
            fi

            sed -i "s|^DEPLOYMENT_MODE=.*|DEPLOYMENT_MODE=${DEPLOYMENT_MODE}|" "\$BOOTSTRAP_FILE"

            cd "\$REPO_DIR/ansible"

            ansible-playbook \
                -i inventory.ini \
                update-domains.yml

            EOF
