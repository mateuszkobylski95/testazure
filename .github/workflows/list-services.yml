name: List Services

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  list-services:
    runs-on: ubuntu-latest

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:

      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Read Terraform Outputs
        working-directory: terraform
        id: tf
        run: |
          echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: List services
        env:
          VM_IP: ${{ steps.tf.outputs.public_ip }}
          SSH_USER: azureuser

        run: |
          ssh -o StrictHostKeyChecking=no \
          ${SSH_USER}@${VM_IP} <<EOF

          set -e

          BOOTSTRAP_FILE=\$(find /opt -maxdepth 2 -name ".bootstrap.env" | head -n 1)

          if [ -z "\$BOOTSTRAP_FILE" ]; then
            echo ".bootstrap.env not found"
            exit 1
          fi

          REPO_DIR=\$(dirname "\$BOOTSTRAP_FILE")

          echo "Repository: \$REPO_DIR"
          echo

          export REPO_DIR

          python3 - <<PYTHON
          import pathlib
          import yaml
          import os

          services_dir = pathlib.Path(
          os.environ["REPO_DIR"]
          ) / "services"
          print(f"Services dir: {services_dir}")

          files = sorted(
              services_dir.glob("*.yml")
          )

          if not files:
              print("No services found")
              raise SystemExit(0)

          print()
          print("=== SERVICES ===")
          print()

          for file in files:

              data = yaml.safe_load(
                  file.read_text()
              )

              print(
                  f"Name: {data['name']}"
              )

              print(
                  f"VPN IP: {data['vpn_ip']}"
              )

              if data.get("has_domain"):

                  print(
                      f"Domain: {data['domain']}"
                  )

              else:

                  print(
                      f"Public Port: {data['public_port']}"
                  )

              print(
                  f"Path: {data['path']}"
              )

              print(
                  f"Basic Auth: {data['basic_auth']}"
              )

              print("-" * 40)

          PYTHON

          EOF
